{{- if .Values.restore.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "postgres.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: {{ .Values.restore.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.restore.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "postgres.labels" . | nindent 8 }}
    spec:
      restartPolicy: {{ .Values.restore.job.restartPolicy }}
      containers:
      - name: init-db
        image: postgres:{{ .Values.postgres.image.tag }}
        env:
        - name: PGPASSWORD
          value: {{ .Values.postgres.auth.password }}
        - name: PGUSER
          value: {{ .Values.postgres.auth.username }}
        - name: PGHOST
          value: {{ include "postgres.fullname" . }}
        - name: PGPORT
          value: {{ .Values.postgres.service.port | quote }}
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          
          echo "Creating databases..."
          psql -d postgres -f /scripts/init.sql
          
          echo "Importing schema dump..."
          if [ -f /schema/aw_pg_schema.dump ]; then
            pg_restore -d postgres /schema/aw_pg_schema.dump 2>/dev/null || echo "Schema import completed with warnings"
          fi
          
          # Function to import SQL files to a specific database
          import_sql_files() {
            local db_name=$1
            local sql_dir="/sql/${db_name}"
            
            if [ -d "$sql_dir" ]; then
              echo "Importing SQL files to $db_name..."
              for sql_file in "$sql_dir"/*.sql; do
                if [ -f "$sql_file" ]; then
                  echo "  Importing $(basename $sql_file)..."
                  psql -d "$db_name" -f "$sql_file"
                fi
              done
            fi
          }
          
          # Import in specific order (config_master first due to dependencies)
          echo "Starting SQL imports..."
          import_sql_files "config_master"
          import_sql_files "login_manager_service"
          import_sql_files "attendance_manager_service"
          import_sql_files "download_manager_service"
          import_sql_files "postmaster_service"
          import_sql_files "rostering_service"
          import_sql_files "api_gateway_service"
          
          echo "Database initialization completed successfully!"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: schema
          mountPath: /schema
        - name: sql
          mountPath: /sql
      volumes:
      - name: scripts
        configMap:
          name: {{ include "postgres.fullname" . }}-db-init-script
      - name: schema
        projected:
          sources:
          {{- range $path, $_ := .Files.Glob "DB/*.dump" }}
          - configMap:
              name: {{ include "postgres.fullname" $ }}-schema-{{ trimSuffix ".dump" (base $path) }}
          {{- end }}
      - name: sql
        projected:
          sources:
          {{- range $path, $_ := .Files.Glob "DB/*.sql" }}
          - configMap:
              name: {{ include "postgres.fullname" $ }}-sql-{{ trimSuffix ".sql" (base $path) | replace "_" "-" | lower }}
          {{- end }}
{{- end }}