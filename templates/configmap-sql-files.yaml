{{- if .Values.restore.enabled }}
{{- $files := .Files }}
{{- $name := include "postgres.fullname" . }}
{{- $namespace := .Release.Namespace }}

{{- /* Use correct path: files/DB/*.sql */ -}}
{{- $sqlFiles := .Files.Glob "files/DB/*.sql" }}
{{- $dumpFiles := .Files.Glob "files/DB/*.dump" }}

{{- if and (eq (len $sqlFiles) 0) (eq (len $dumpFiles) 0) }}
{{- fail "No SQL or dump files found in files/DB/ directory" }}
{{- end }}

# SQL Files ConfigMaps
{{- range $path, $_ := $sqlFiles }}
{{- $fileName := base $path }}
{{- $sqlContent := $files.Get $path }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-sql-%s" $name (trimSuffix ".sql" $fileName | replace "_" "-" | replace "." "-" | lower) }}
  namespace: {{ $namespace }}
  labels:
    {{- include "postgres.labels" $ | nindent 4 }}
    postgres-file-type: "sql"
    postgres-file-name: {{ $fileName | quote }}
data:
  {{ $fileName }}: {{ $sqlContent | quote }}
{{- end }}

# Schema Dump ConfigMap
{{- range $path, $_ := $dumpFiles }}
{{- $fileName := base $path }}
{{- $dumpContent := $files.Get $path }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-schema-%s" $name (trimSuffix ".dump" $fileName) }}
  namespace: {{ $namespace }}
  labels:
    {{- include "postgres.labels" $ | nindent 4 }}
    postgres-file-type: "schema"
data:
  {{ $fileName }}: {{ $dumpContent | b64enc | quote }}
{{- end }}
{{- end }}